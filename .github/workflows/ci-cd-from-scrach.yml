name: learning CI-CD from scrach
on:
  # Trigger on pushes to main or develop branches
  push:
    branches: [main, develop]
    paths:
      - 'src/**'
      - '.github/workflows/ci-cd-from-scrach.yml'

  # Trigger on PRs targeting main
  pull_request:
    branches: [main]
    

  # Allow manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      node_version:
        description: 'Node.js version to use'
        required: false
        default: '20'
        type: choice
        options: ['18', '20', '22']
  
  # Restrict token permissions to minimum required (security best practice)
permissions:
  contents: read        # Read repo code
  checks: write         # Write test results as checks

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true


jobs: 
  # ──────────────────────────────────────────
  # JOB: Secret Scanning
  # Runs Gitleaks to detect accidentally committed secrets
  # ──────────────────────────────────────────
  secret-scan:
    name: 🔐 Secret Scanning (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Fetch full history so Gitleaks can scan all commits
          fetch-depth: 0

      - name: Run Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: false  # Fail pipeline if secrets are found

  # ──────────────────────────────────────────
  # JOB: Lint & Test
  # ──────────────────────────────────────────
  lint:
    name: 🧪 Lint
    runs-on: ubuntu-latest
    needs: secret-scan
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - run: npm ci
      - name: Run ESLint
        run: npm run lint


  Unit-Test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - run: npm ci
      - name: Run tests
        run: npm test
        env:
          CI: true
      - name: Upload test coverage
        uses: actions/upload-artifact@v4
        with:
          name: react-coverage
          path: coverage/
          retention-days: 7

# ──────────────────────────────────────────
  # JOB: Build
  # ──────────────────────────────────────────
  build:
    name: 🔨 Build React App
    runs-on: ubuntu-latest
    needs: Unit-Test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - run: npm ci

      - name: Build for production
        run: npm run build
        env:
          CI: true
          # Inject build metadata into the React app
          # These become available as process.env.REACT_APP_* in the app
          REACT_APP_VERSION: ${{ github.sha }}
          REACT_APP_ENV: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
          REACT_APP_BUILD_DATE: ${{ github.event.head_commit.timestamp }}

      - name: Analyze build output
        run: |
          echo "=== Build directory ==="
          ls -lh build/
          echo "=== Bundle sizes ==="
          ls -lh build/static/js/*.js 2>/dev/null || echo "No JS files found"
          ls -lh build/static/css/*.css 2>/dev/null || echo "No CSS files found"
          echo "=== Total size ==="
          du -sh build/

        # Upload the build directory as an artifact so the deploy job can use it
      # This avoids rebuilding in the deploy job
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: react-build-${{ github.sha }}
          path: build/
          retention-days: 14

  # ──────────────────────────────────────────
  # JOB: Deploy to S3
  # Only runs on push to main (not PRs)
  # ──────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to S3 
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: test
      #url: https://your-cloudfront-domain.cloudfront.net
      url: http://s3-static-website-project-4.s3-website-us-east-1.amazonaws.com

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: react-build-${{ github.sha }}
          path: build/

      # OIDC Authentication — no keys stored in GitHub
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/OIDC_Role_GitHubActions
          aws-region: ${{ env.AWS_REGION }}

      # Sync the build directory to S3.
      # --delete: removes files in S3 that no longer exist locally
      # --cache-control: tells browsers and CloudFront how long to cache files
      - name: Deploy to S3
        run: |
          # Deploy HTML files with no-cache (always fetch latest)
          aws s3 sync build/ s3://${{ env.S3_BUCKET }}/ \
            --delete \
            --exclude "*.js" \
            --exclude "*.css" \
            --cache-control "no-cache, no-store, must-revalidate"

          # Deploy hashed JS/CSS files with long cache (1 year)
          # These files have content hashes in their names, so stale cache is safe
          aws s3 sync build/static/ s3://${{ env.S3_BUCKET }}/static/ \
            --cache-control "public, max-age=31536000, immutable"




